name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install requests pyflakes

      - name: Check for syntax errors (pyflakes)
        run: pyflakes src/ configs/

      - name: Verify imports resolve correctly
        run: |
          python -c "from src.model import GPT; print('model.py OK')"
          python -c "from src.dataset import CharTokenizer, TextDataset, build_dataloader; print('dataset.py OK')"
          python -c "from configs.config import GPTConfig; print('config.py OK')"

      - name: Smoke test — model forward pass
        run: |
          python - <<'EOF'
          import torch
          from src.model import GPT
          from configs.config import GPTConfig

          cfg = GPTConfig(vocab_size=65, d_model=64, n_heads=4, n_layers=2, d_ff=128, max_seq_len=32)
          model = GPT(cfg.vocab_size, cfg.d_model, cfg.n_heads, cfg.n_layers, cfg.d_ff, cfg.max_seq_len)
          x = torch.randint(0, cfg.vocab_size, (2, 32))
          logits = model(x)
          assert logits.shape == (2, 32, cfg.vocab_size), f"Unexpected shape: {logits.shape}"
          print(f"Forward pass OK — output shape: {logits.shape}")
          print(f"Parameters: {model.num_parameters():,}")
          EOF
